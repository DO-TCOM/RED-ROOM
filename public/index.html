<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RED.ROOM</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f; --surface: #111118; --card: #181825; --border: #1e1e2e;
      --accent: #cc2222; --blue: #6e9fff; --red: #cc2222; --yellow: #ffcc44;
      --text: #d0d0e0; --muted: #555568;
      --fs: clamp(13px, 1.1vw, 18px);
    }
    body.light {
      --bg: #f0f0f5; --surface: #e4e4ee; --card: #dcdce8; --border: #c8c8d8;
      --accent: #cc2222; --blue: #2563eb; --red: #cc2222; --yellow: #d97706;
      --text: #1a1a2e; --muted: #888899;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: var(--fs); overflow: hidden; transition: background .3s, color .3s; }

    #app {
      display: none;
      width: 100vw; height: 100vh;
      grid-template-columns: 170px 1fr 38%;
      grid-template-rows: 48px 1fr 210px;
    }
    #app.show { display: grid; }

    @media (max-width: 960px) {
      #app { grid-template-columns: 0px 1fr 42%; grid-template-rows: 44px 1fr 150px; }
      #members-panel { display: none !important; }
    }
    @media (max-width: 600px) {
      #app { grid-template-columns: 100% 0px 0px; grid-template-rows: 44px 1fr 0px; }
      #yt-area, #members-panel, #cam-row { display: none !important; }
      #chat-panel { grid-column: 1 !important; grid-row: 2 !important; }
    }

    header { grid-column: 1 / -1; grid-row: 1; display: flex; align-items: center; justify-content: space-between; padding: 0 14px; border-bottom: 1px solid var(--border); background: var(--surface); gap: 10px; flex-shrink: 0; }
    .h-logo { font-family: 'Syne', sans-serif; font-size: .95rem; font-weight: 800; color: var(--accent); letter-spacing: -.5px; flex-shrink: 0; }
    .h-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .h-status { display: flex; align-items: center; gap: 5px; font-size: .72rem; color: var(--muted); }
    .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    .fs-ctrl { display: flex; align-items: center; gap: 4px; }
    .fs-btn { background: var(--card); border: 1px solid var(--border); color: var(--text); width: 24px; height: 24px; cursor: pointer; font-size: .75rem; font-family: 'JetBrains Mono', monospace; display: flex; align-items: center; justify-content: center; transition: border-color .15s; }
    .fs-btn:hover { border-color: var(--accent); color: var(--accent); }
    .fs-val { font-size: .72rem; color: var(--muted); min-width: 26px; text-align: center; }

    .hbtn { background: var(--card); border: 1px solid var(--border); color: var(--text); cursor: pointer; font-size: .72rem; padding: 3px 8px; font-family: 'JetBrains Mono', monospace; letter-spacing: 1px; text-transform: uppercase; transition: border-color .2s; white-space: nowrap; }
    .hbtn:hover { border-color: var(--accent); }
    .lang-mini { display: flex; gap: 3px; }
    .lang-mini-btn { background: none; border: 1px solid var(--border); cursor: pointer; font-size: .8rem; padding: 1px 4px; transition: border-color .15s; }
    .lang-mini-btn:hover, .lang-mini-btn.active { border-color: var(--accent); }
    #renameBtn { border-color: var(--muted); max-width: 140px; overflow: hidden; text-overflow: ellipsis; }

    #members-panel { grid-column: 1; grid-row: 2 / 4; border-right: 1px solid var(--border); background: var(--surface); display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
    .members-title { font-size: .65rem; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; padding: 10px 8px 8px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    #user-list { flex: 1; overflow-y: auto; padding: 5px 0; }
    #user-list::-webkit-scrollbar { width: 3px; }
    #user-list::-webkit-scrollbar-thumb { background: var(--border); }
    .user-row { display: flex; align-items: center; gap: 4px; padding: 5px 7px; font-size: .75rem; min-width: 0; overflow: hidden; animation: sIn .2s ease; }
    @keyframes sIn { from{opacity:0;transform:translateX(-5px)} to{opacity:1;transform:translateX(0)} }
    .user-av { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; font-size: .6rem; font-weight: 700; flex-shrink: 0; }
    .user-av.me { background: var(--accent); color: var(--bg); }
    .user-av.other { background: var(--border); color: var(--blue); }
    .user-row-name { flex: 1; font-size: .75rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; }
    .user-media { display: flex; gap: 2px; font-size: .65rem; flex-shrink: 0; }
    .um-on { color: var(--accent); } .um-off { color: var(--red); opacity: .4; }

    #chat-panel { grid-column: 2; grid-row: 2 / 4; display: flex; flex-direction: column; overflow: hidden; background: var(--surface); min-width: 0; min-height: 0; }
    #panel-chat { flex: 1; overflow-y: auto; padding: 10px 14px; display: flex; flex-direction: column; gap: 3px; }
    #panel-chat::-webkit-scrollbar { width: 3px; }
    #panel-chat::-webkit-scrollbar-thumb { background: var(--border); }
    .msg { padding: 7px 10px; animation: mIn .2s ease; }
    @keyframes mIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
    .msg.own   { background: rgba(204,34,34,.05); border-left: 2px solid var(--accent); }
    .msg.other { background: rgba(110,159,255,.04); border-left: 2px solid var(--blue); }
    .msg-hd { display: flex; gap: 6px; align-items: baseline; margin-bottom: 2px; }
    .msg-name { font-size: .75rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
    .msg.own .msg-name { color: var(--accent); } .msg.other .msg-name { color: var(--blue); }
    .msg-time { font-size: .65rem; color: var(--muted); }
    .msg-text { font-size: .95rem; line-height: 1.55; word-break: break-word; }
    .sys-msg { align-self: center; font-size: .65rem; color: var(--yellow); padding: 3px 10px; border: 1px solid rgba(255,204,68,.15); background: rgba(255,204,68,.03); animation: mIn .2s ease; text-align: center; margin: 2px 0; }
    .chat-hint { font-size: .62rem; color: var(--muted); padding: 3px 14px; border-top: 1px solid var(--border); flex-shrink: 0; }
    .chat-input-area { padding: 12px 12px; border-top: 1px solid var(--border); background: var(--surface); display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .chat-prompt { color: var(--accent); font-size: .85rem; opacity: .5; }
    .chat-inp { flex: 1; background: transparent; border: none; color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: .95rem; outline: none; caret-color: var(--accent); }
    .chat-inp::placeholder { color: var(--muted); }
    .send-btn { background: var(--accent); color: var(--bg); border: none; font-family: 'JetBrains Mono', monospace; font-size: .65rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; padding: 6px 10px; cursor: pointer; transition: opacity .2s; flex-shrink: 0; }
    .send-btn:hover { opacity: .8; }

    #yt-area { grid-column: 3; grid-row: 2 / 3; background: #000; display: flex; flex-direction: column; overflow: hidden; min-width: 0; min-height: 0; }
    #yt-player-wrap { flex: 1; position: relative; background: #000; min-height: 0; overflow: hidden; }
    #yt-player-wrap iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }
    .yt-empty { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 10px; background: var(--card); }
    .yt-empty-icon { font-size: 2rem; opacity: .25; }
    .yt-empty-text { font-size: .72rem; color: var(--muted); text-align: center; line-height: 1.9; }
    .yt-empty-cmd { color: var(--accent); font-weight: 700; }
    .yt-controls { background: var(--surface); border-top: 1px solid var(--border); padding: 5px 8px; display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
    .yt-btn { background: var(--card); border: 1px solid var(--border); color: var(--text); font-size: .72rem; padding: 3px 7px; cursor: pointer; font-family: 'JetBrains Mono', monospace; transition: border-color .15s, color .15s; white-space: nowrap; }
    .yt-btn:hover { border-color: var(--accent); color: var(--accent); }
    .yt-btn:disabled { opacity: .3; cursor: default; }
    .yt-progress-wrap { flex: 1; display: flex; align-items: center; gap: 5px; }
    .yt-progress { flex: 1; height: 3px; background: var(--border); cursor: pointer; position: relative; }
    .yt-progress-fill { height: 100%; background: var(--accent); width: 0%; transition: width .5s linear; pointer-events: none; }
    .yt-time { font-size: .62rem; color: var(--muted); white-space: nowrap; }
    .yt-playlist { background: var(--surface); border-top: 1px solid var(--border); padding: 5px 8px; display: flex; gap: 5px; overflow-x: auto; flex-shrink: 0; align-items: center; }
    .yt-playlist::-webkit-scrollbar { height: 3px; }
    .yt-playlist::-webkit-scrollbar-thumb { background: var(--border); }
    .yt-playlist-label { font-size: .62rem; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; white-space: nowrap; }
    .yt-item { display: flex; align-items: center; gap: 4px; background: var(--card); border: 1px solid var(--border); padding: 3px 7px; cursor: pointer; font-size: .65rem; white-space: nowrap; transition: border-color .15s; flex-shrink: 0; }
    .yt-item:hover { border-color: #353550; }
    .yt-item.active { border-color: var(--accent); color: var(--accent); }
    .yt-item-thumb { width: 26px; height: 16px; object-fit: cover; }
    .yt-item-remove { color: var(--red); cursor: pointer; padding: 0 2px; }
    .yt-empty-playlist { font-size: .65rem; color: var(--muted); }

    #cam-row { grid-column: 3; grid-row: 3; border-top: 1px solid var(--border); background: var(--bg); display: flex; align-items: stretch; overflow-x: auto; min-height: 0; }
    #cam-row::-webkit-scrollbar { height: 3px; }
    #cam-row::-webkit-scrollbar-thumb { background: var(--border); }
    #cam-tiles { display: flex; gap: 5px; padding: 5px; flex: 1; }
    .video-tile { position: relative; background: var(--card); border: 1px solid var(--border); overflow: hidden; width: clamp(110px, 14vw, 190px); flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .video-tile video { width: 100%; height: 100%; object-fit: cover; display: block; }
    .cam-off { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 4px; background: var(--card); }
    .cam-off-av { width: 30px; height: 30px; background: var(--border); display: flex; align-items: center; justify-content: center; font-size: .75rem; font-weight: 700; color: var(--blue); }
    .cam-off-nm { font-size: .55rem; color: var(--muted); }
    .tile-name { position: absolute; bottom: 3px; left: 3px; background: rgba(10,10,15,.85); font-size: .55rem; color: var(--text); padding: 1px 4px; }
    .tile-badges { position: absolute; top: 3px; right: 3px; display: flex; gap: 2px; }
    .tile-badge { font-size: .55rem; background: rgba(10,10,15,.85); padding: 1px 3px; }
    .tile-badge.on { color: var(--accent); } .tile-badge.off { color: var(--red); opacity: .5; }
    .my-controls { padding: 5px; border-left: 1px solid var(--border); display: flex; flex-direction: column; gap: 5px; justify-content: center; flex-shrink: 0; }
    .ctrl-btn { display: flex; align-items: center; gap: 4px; padding: 6px 9px; border: 1px solid var(--border); background: var(--card); color: var(--text); cursor: pointer; font-family: 'JetBrains Mono', monospace; font-size: .65rem; letter-spacing: 1px; text-transform: uppercase; transition: all .15s; white-space: nowrap; }
    .ctrl-btn.active-cam { border-color: var(--accent); color: var(--accent); }
    .ctrl-btn.active-mic { border-color: var(--blue); color: var(--blue); }
    .ctrl-btn.muted-cam, .ctrl-btn.muted-mic { border-color: var(--red); color: var(--red); }

    #rename-modal { display: none; position: fixed; inset: 0; background: rgba(10,10,15,.88); backdrop-filter: blur(4px); z-index: 200; align-items: center; justify-content: center; }
    #rename-modal.open { display: flex; }
    .rename-box { background: var(--surface); border: 1px solid var(--border); padding: 26px 22px; display: flex; flex-direction: column; gap: 12px; width: min(290px, 90vw); }
    .rename-title { font-size: .72rem; color: var(--accent); letter-spacing: 3px; text-transform: uppercase; }
    .rename-inp { background: var(--card); border: 1px solid var(--border); color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: .95rem; padding: 10px 12px; outline: none; width: 100%; caret-color: var(--accent); }
    .rename-inp:focus { border-color: var(--accent); }
    .rename-err { font-size: .65rem; color: var(--red); min-height: 14px; }
    .rename-btns { display: flex; gap: 8px; }
    .rename-ok { flex: 1; background: var(--accent); color: #fff; border: none; font-family: 'JetBrains Mono', monospace; font-size: .72rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; padding: 10px; cursor: pointer; }
    .rename-cancel { background: var(--card); color: var(--muted); border: 1px solid var(--border); font-family: 'JetBrains Mono', monospace; font-size: .72rem; padding: 10px 14px; cursor: pointer; }
  </style>
</head>
<body>

<div id="app" class="show">
  <header>
    <div class="h-logo">RED<span style="color:var(--text);opacity:.2">.</span>ROOM</div>
    <div class="h-right">
      <div class="fs-ctrl">
        <button class="fs-btn" onclick="changeFontSize(-1)">A−</button>
        <span class="fs-val" id="fsVal">—</span>
        <button class="fs-btn" onclick="changeFontSize(1)">A+</button>
      </div>
      <button class="hbtn" onclick="toggleTheme()" id="themeBtn">☀️</button>
      <div class="lang-mini">
        <button class="lang-mini-btn active" id="lmFr" onclick="setLang('fr')">🇫🇷</button>
        <button class="lang-mini-btn" id="lmEn" onclick="setLang('en')">🇬🇧</button>
        <button class="lang-mini-btn" id="lmEs" onclick="setLang('es')">🇪🇸</button>
      </div>
      <button class="hbtn" id="renameBtn" onclick="openRename()" style="border-color:var(--muted)">✏️ <span id="myNameDisplay">…</span></button>
      <div class="h-status"><div class="dot"></div><span data-i18n="connected">connecté</span></div>
    </div>
  </header>

  <div id="members-panel">
    <div class="members-title" data-i18n="members">Membres</div>
    <div id="user-list"></div>
  </div>

  <div id="chat-panel">
    <div id="panel-chat"></div>
    <div class="chat-hint" id="chatHint"></div>
    <div class="chat-input-area">
      <span class="chat-prompt">›</span>
      <input class="chat-inp" id="chatInp" type="text" maxlength="300" autocomplete="off"/>
      <button class="send-btn" id="sendBtn">→</button>
    </div>
  </div>

  <div id="yt-area">
    <div id="yt-player-wrap">
      <div class="yt-empty" id="yt-empty">
        <div class="yt-empty-icon">🎬</div>
        <div class="yt-empty-text" id="ytEmptyText"></div>
      </div>
    </div>
    <div class="yt-controls">
      <button class="yt-btn" id="btnPrev" onclick="videoControl('prev')" disabled>⏮</button>
      <button class="yt-btn" id="btnPlay" onclick="togglePlay()" disabled>▶</button>
      <button class="yt-btn" id="btnNext" onclick="videoControl('next')" disabled>⏭</button>
      <div class="yt-progress-wrap">
        <div class="yt-progress" id="ytProgress" onclick="seekClick(event)">
          <div class="yt-progress-fill" id="ytProgressFill"></div>
        </div>
      </div>
      <div class="yt-time" id="ytTime">0:00 / 0:00</div>
    </div>
    <div class="yt-playlist">
      <div class="yt-playlist-label" data-i18n="playlist">Playlist</div>
      <div id="yt-playlist-items" style="display:flex;gap:5px;align-items:center"></div>
    </div>
  </div>

  <div id="cam-row">
    <div id="cam-tiles"></div>
    <div class="my-controls">
      <button class="ctrl-btn muted-cam" id="btnCam"><span>📷</span><span id="lblCam">OFF</span></button>
      <button class="ctrl-btn muted-mic" id="btnMic"><span>🎙️</span><span id="lblMic">OFF</span></button>
    </div>
  </div>
</div>

<div id="rename-modal">
  <div class="rename-box">
    <div class="rename-title">✏️ Changer de pseudo</div>
    <input class="rename-inp" id="renameInp" type="text" maxlength="20" autocomplete="off" placeholder="Nouveau pseudo…"/>
    <div class="rename-err" id="renameErr"></div>
    <div class="rename-btns">
      <button class="rename-cancel" onclick="closeRename()">Annuler</button>
      <button class="rename-ok" onclick="submitRename()">Confirmer →</button>
    </div>
  </div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script src="/socket.io/socket.io.js"></script>
<script>
const LANGS = {
  fr: { connected:'connecté', members:'Membres', playlist:'Playlist', chatPlaceholder:'Message ou !ytb …', chatHint:'!ytb [lien YouTube] pour ajouter une vidéo', ytbEmpty:'Aucune vidéo\nTape !ytb [lien YouTube] dans le chat\n(max 5)', ytbEmptyPlaylist:'Vide · !ytb', you:'(toi)', sysJoined:'a rejoint', sysLeft:'a quitté', sysKicked:'a été expulsé', sysYtbAdded:'a ajouté une vidéo', sysYtbRemoved:'a retiré une vidéo', sysYtbNext:'vidéo suivante', sysYtbPrev:'vidéo précédente', sysYtbSelect:'a changé de vidéo', sysYtbInvalid:'❌ Lien invalide.', sysYtbFull:'❌ Playlist pleine (max 5).', online:'en ligne' },
  en: { connected:'connected', members:'Members', playlist:'Playlist', chatPlaceholder:'Message or !ytb …', chatHint:'!ytb [YouTube link] to add a video', ytbEmpty:'No video\nType !ytb [YouTube link] in chat\n(max 5)', ytbEmptyPlaylist:'Empty · !ytb', you:'(you)', sysJoined:'joined', sysLeft:'left', sysKicked:'was kicked', sysYtbAdded:'added a video', sysYtbRemoved:'removed a video', sysYtbNext:'next video', sysYtbPrev:'previous video', sysYtbSelect:'changed video', sysYtbInvalid:'❌ Invalid link.', sysYtbFull:'❌ Playlist full (max 5).', online:'online' },
  es: { connected:'conectado', members:'Miembros', playlist:'Lista', chatPlaceholder:'Mensaje o !ytb …', chatHint:'!ytb [enlace] para añadir video', ytbEmpty:'Sin video\nEscribe !ytb [enlace YouTube]\n(máx 5)', ytbEmptyPlaylist:'Vacía · !ytb', you:'(tú)', sysJoined:'entró', sysLeft:'salió', sysKicked:'fue expulsado', sysYtbAdded:'añadió un video', sysYtbRemoved:'eliminó un video', sysYtbNext:'siguiente video', sysYtbPrev:'video anterior', sysYtbSelect:'cambió video', sysYtbInvalid:'❌ Enlace inválido.', sysYtbFull:'❌ Lista llena (máx 5).', online:'en línea' }
};
let currentLang = 'fr';
const t = k => (LANGS[currentLang] && LANGS[currentLang][k]) || (LANGS.fr[k]) || k;

function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => { el.textContent = t(el.dataset.i18n); });
  ['lmFr','lmEn','lmEs'].forEach(id => document.getElementById(id).classList.remove('active'));
  document.getElementById(lang==='fr'?'lmFr':lang==='en'?'lmEn':'lmEs').classList.add('active');
  document.getElementById('chatInp').placeholder = t('chatPlaceholder');
  document.getElementById('chatHint').textContent = t('chatHint');
  document.getElementById('ytEmptyText').innerHTML = t('ytbEmpty').replace(/\n/g,'<br>').replace(/(!ytb \[.*?\])/g,'<span class="yt-empty-cmd">$1</span>');
  renderPlaylist();
}

let isDark = true;
function toggleTheme() {
  isDark = !isDark;
  document.body.classList.toggle('light', !isDark);
  document.getElementById('themeBtn').textContent = isDark ? '☀️' : '🌙';
}

let fontSize = 15;
function changeFontSize(delta) {
  fontSize = Math.min(28, Math.max(11, fontSize + delta));
  document.documentElement.style.setProperty('--fs', fontSize + 'px');
  document.getElementById('fsVal').textContent = fontSize;
}
(function() {
  const computed = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--fs'));
  fontSize = computed || 15;
  document.getElementById('fsVal').textContent = fontSize;
})();

const socket = io();
let myId = null, myName = null, localStream = null, videoOn = false, micOn = false;
const peers = {};
const ICE = { iceServers: [{ urls:'stun:stun.l.google.com:19302' },{ urls:'stun:stun1.l.google.com:19302' }] };
let ytPlayer = null, ytPlaylist = [], ytCurrentIndex = -1, ytProgressInterval = null, isSyncingFromServer = false;
let ytApiReady = false, ytPendingLoad = null;

const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const fmtTime = s => { s=Math.floor(s||0); return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`; };

function addToChat(el) {
  const chat = document.getElementById('panel-chat');
  chat.appendChild(el);
  chat.scrollTop = chat.scrollHeight;
}

socket.on('connect', () => {
  myId = socket.id;
  const roomName = window.location.pathname.replace(/^\//, '') || 'default';
  socket.emit('joinRoom', roomName);
});

socket.on('joinOk', ({ username, isAdmin }) => {
  myName = username;
  document.getElementById('myNameDisplay').textContent = username;
  makeTile(myId, username, null, true);
  document.getElementById('chatInp').focus();
  setLang(currentLang);
});

socket.on('joinError', () => console.error('Join error'));
socket.on('kicked', () => { alert('Tu as été expulsé du salon.'); location.reload(); });

socket.on('system', ({ text, event, count }) => {
  const evMap = { joined:'sysJoined', left:'sysLeft', kicked:'sysKicked', ytbAdded:'sysYtbAdded', ytbRemoved:'sysYtbRemoved', ytbNext:'sysYtbNext', ytbPrev:'sysYtbPrev', ytbSelect:'sysYtbSelect', ytbInvalid:'sysYtbInvalid', ytbFull:'sysYtbFull' };
  const withName = ['joined','left','kicked','ytbAdded','ytbRemoved','ytbSelect'];
  let msg;
  if (event === 'renamed') { msg = esc(text); }
  else { msg = (withName.includes(event) ? esc(text) + ' ' : '') + t(evMap[event] || event); }
  const div = document.createElement('div');
  div.className = 'sys-msg';
  div.innerHTML = msg + ` <span style="color:var(--muted)">[${count} ${t('online')}]</span>`;
  addToChat(div);
});

function onYouTubeIframeAPIReady() {
  ytApiReady = true;
  if (ytPendingLoad) { loadYTVideo(...ytPendingLoad); ytPendingLoad = null; }
}

function loadYTVideo(videoId, startTime, autoPlay) {
  if (!ytApiReady) { ytPendingLoad = [videoId, startTime, autoPlay]; return; }
  document.getElementById('yt-empty').style.display = 'none';
  document.getElementById('btnPrev').disabled = ytCurrentIndex <= 0;
  document.getElementById('btnNext').disabled = ytCurrentIndex >= ytPlaylist.length - 1;
  document.getElementById('btnPlay').disabled = false;
  if (ytPlayer && ytPlayer.loadVideoById) {
    isSyncingFromServer = true;
    ytPlayer.loadVideoById({ videoId, startSeconds: startTime || 0 });
    setTimeout(() => { if (!autoPlay) ytPlayer.pauseVideo(); isSyncingFromServer = false; }, 1200);
  } else {
    isSyncingFromServer = true;
    const wrap = document.getElementById('yt-player-wrap');
    const div = document.createElement('div'); div.id = 'yt-iframe'; wrap.appendChild(div);
    ytPlayer = new YT.Player('yt-iframe', {
      videoId,
      playerVars: { autoplay: autoPlay ? 1 : 0, controls: 0, disablekb: 1, rel: 0, modestbranding: 1, start: Math.floor(startTime || 0) },
      events: {
        onReady: () => { isSyncingFromServer = false; startProgressTimer(); },
        onStateChange: (e) => {
          document.getElementById('btnPlay').textContent = e.data === YT.PlayerState.PLAYING ? '⏸' : '▶';
          if (!isSyncingFromServer && e.data === YT.PlayerState.ENDED && ytCurrentIndex < ytPlaylist.length - 1) { videoControl('next'); }
        }
      }
    });
  }
  startProgressTimer();
}

function startProgressTimer() {
  clearInterval(ytProgressInterval);
  ytProgressInterval = setInterval(() => {
    if (!ytPlayer || typeof ytPlayer.getCurrentTime !== 'function') return;
    const cur = ytPlayer.getCurrentTime() || 0, dur = ytPlayer.getDuration() || 0;
    if (dur > 0) {
      document.getElementById('ytProgressFill').style.width = (cur / dur * 100) + '%';
      document.getElementById('ytTime').textContent = fmtTime(cur) + ' / ' + fmtTime(dur);
    }
  }, 500);
}

function togglePlay() {
  if (!ytPlayer) return;
  const playing = ytPlayer.getPlayerState() === YT.PlayerState.PLAYING;
  socket.emit('videoControl', { action: playing ? 'pause' : 'play', value: ytPlayer.getCurrentTime() });
}
function videoControl(action, value) { socket.emit('videoControl', { action, value }); }
function seekClick(e) {
  if (!ytPlayer) return;
  const r = e.currentTarget.getBoundingClientRect();
  socket.emit('videoControl', { action: 'seek', value: ((e.clientX - r.left) / r.width) * (ytPlayer.getDuration() || 0) });
}

socket.on('videoState', ({ playlist, currentIndex, playerState }) => {
  ytPlaylist = playlist; ytCurrentIndex = currentIndex;
  renderPlaylist();
  document.getElementById('btnPlay').disabled = playlist.length === 0 || currentIndex < 0;
  document.getElementById('btnPrev').disabled = currentIndex <= 0;
  document.getElementById('btnNext').disabled = currentIndex >= playlist.length - 1;
  if (playlist.length === 0 || currentIndex < 0) { document.getElementById('yt-empty').style.display = 'flex'; return; }
  const video = playlist[currentIndex];
  const elapsed = playerState.playing ? (Date.now() - playerState.updatedAt) / 1000 : 0;
  const syncTime = (playerState.currentTime || 0) + elapsed;
  document.getElementById('btnPlay').textContent = playerState.playing ? '⏸' : '▶';
  if (!ytPlayer || !ytPlayer.getVideoData) { loadYTVideo(video.videoId, syncTime, playerState.playing); return; }
  const cur = ytPlayer.getVideoData() && ytPlayer.getVideoData().video_id;
  if (cur !== video.videoId) {
    loadYTVideo(video.videoId, syncTime, playerState.playing);
  } else {
    isSyncingFromServer = true;
    if (Math.abs((ytPlayer.getCurrentTime() || 0) - syncTime) > 2) ytPlayer.seekTo(syncTime, true);
    if (playerState.playing) ytPlayer.playVideo(); else ytPlayer.pauseVideo();
    setTimeout(() => { isSyncingFromServer = false; }, 800);
  }
});

function renderPlaylist() {
  const el = document.getElementById('yt-playlist-items');
  if (ytPlaylist.length === 0) { el.innerHTML = `<div class="yt-empty-playlist">${t('ytbEmptyPlaylist')}</div>`; return; }
  el.innerHTML = '';
  ytPlaylist.forEach((v, i) => {
    const div = document.createElement('div');
    div.className = 'yt-item' + (i === ytCurrentIndex ? ' active' : '');
    div.innerHTML = `<img class="yt-item-thumb" src="https://img.youtube.com/vi/${v.videoId}/default.jpg" loading="lazy"><span>${esc(v.addedBy)} #${i+1}</span><span class="yt-item-remove" onclick="event.stopPropagation();videoControl('remove',${i})">✕</span>`;
    div.onclick = () => videoControl('select', i);
    el.appendChild(div);
  });
}

function makeTile(id, name, stream, isLocal) {
  let tile = document.getElementById('tile-' + id);
  if (!tile) { tile = document.createElement('div'); tile.className = 'video-tile'; tile.id = 'tile-' + id; document.getElementById('cam-tiles').appendChild(tile); }
  tile.innerHTML = `<video id="vid-${id}" autoplay playsinline ${isLocal ? 'muted' : ''}></video><div class="cam-off" id="camoff-${id}"><div class="cam-off-av">${esc(name).substring(0,2).toUpperCase()}</div><div class="cam-off-nm">${esc(name)}</div></div><div class="tile-name">${esc(name)}${isLocal ? ' ' + t('you') : ''}</div><div class="tile-badges"><div class="tile-badge off" id="bc-${id}">📷</div><div class="tile-badge off" id="bm-${id}">🎙️</div></div>`;
  if (stream) { const v = document.getElementById('vid-' + id); if (v) v.srcObject = stream; }
  updateTileState(id, false, false);
}
function removeTile(id) { const t = document.getElementById('tile-' + id); if (t) t.remove(); }
function updateTileState(id, vOn, mOn) {
  const co = document.getElementById('camoff-' + id), v = document.getElementById('vid-' + id);
  const bc = document.getElementById('bc-' + id), bm = document.getElementById('bm-' + id);
  if (!co) return;
  co.style.display = vOn ? 'none' : 'flex';
  if (v) v.style.display = vOn ? 'block' : 'none';
  if (bc) { bc.className = 'tile-badge ' + (vOn ? 'on' : 'off'); }
  if (bm) { bm.className = 'tile-badge ' + (mOn ? 'on' : 'off'); }
}

async function getMedia() {
  try {
    if (localStream) localStream.getTracks().forEach(t => t.stop());
    localStream = new MediaStream();
    if (videoOn || micOn) {
      const s = await navigator.mediaDevices.getUserMedia({ video: videoOn, audio: micOn });
      if (videoOn) s.getVideoTracks().forEach(t => localStream.addTrack(t));
      if (micOn) s.getAudioTracks().forEach(t => localStream.addTrack(t));
    }
    const v = document.getElementById('vid-' + myId); if (v) v.srcObject = localStream.getTracks().length ? localStream : null;
    updateTileState(myId, videoOn, micOn);
    document.getElementById('btnCam').className = 'ctrl-btn ' + (videoOn ? 'active-cam' : 'muted-cam');
    document.getElementById('btnMic').className = 'ctrl-btn ' + (micOn ? 'active-mic' : 'muted-mic');
    document.getElementById('lblCam').textContent = videoOn ? 'ON' : 'OFF';
    document.getElementById('lblMic').textContent = micOn ? 'ON' : 'OFF';
    for (const [pid, peer] of Object.entries(peers)) {
      const senders = peer.pc.getSenders();
      const vT = localStream.getVideoTracks()[0] || null, aT = localStream.getAudioTracks()[0] || null;
      const vs = senders.find(s => s.track && s.track.kind === 'video');
      const as = senders.find(s => s.track && s.track.kind === 'audio');
      if (vs && vT) vs.replaceTrack(vT); else if (vs && !vT) vs.replaceTrack(null); else if (!vs && vT) peer.pc.addTrack(vT, localStream);
      if (as && aT) as.replaceTrack(aT); else if (as && !aT) as.replaceTrack(null); else if (!as && aT) peer.pc.addTrack(aT, localStream);
    }
    socket.emit('mediaState', { videoOn, micOn });
  } catch (err) { alert('Erreur media: ' + err.message); videoOn = micOn = false; }
}

document.getElementById('btnCam').onclick = async () => { videoOn = !videoOn; await getMedia(); };
document.getElementById('btnMic').onclick = async () => { micOn = !micOn; await getMedia(); };

function createPC(peerId, peerName) {
  if (peers[peerId]) return peers[peerId].pc;
  const pc = new RTCPeerConnection(ICE);
  peers[peerId] = { pc, stream: new MediaStream() };
  if (localStream) localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
  pc.ontrack = ({ track }) => { peers[peerId].stream.addTrack(track); const v = document.getElementById('vid-' + peerId); if (v) v.srcObject = peers[peerId].stream; };
  pc.onicecandidate = ({ candidate }) => { if (candidate) socket.emit('webrtc-ice', { to: peerId, candidate }); };
  pc.onnegotiationneeded = async () => {
    try { const offer = await pc.createOffer(); await pc.setLocalDescription(offer); socket.emit('webrtc-offer', { to: peerId, offer }); } catch (e) {}
  };
  makeTile(peerId, peerName, peers[peerId].stream, false);
  return pc;
}
async function callPeer(peerId, peerName) {
  const pc = createPC(peerId, peerName);
  const offer = await pc.createOffer(); await pc.setLocalDescription(offer);
  socket.emit('webrtc-offer', { to: peerId, offer });
}
socket.on('existingUsers', users => users.forEach(u => callPeer(u.id, u.username)));
socket.on('userJoined', ({ id, username }) => { if (!peers[id]) callPeer(id, username); });
socket.on('webrtc-offer', async ({ from, fromName, offer }) => { const pc = createPC(from, fromName); await pc.setRemoteDescription(new RTCSessionDescription(offer)); const ans = await pc.createAnswer(); await pc.setLocalDescription(ans); socket.emit('webrtc-answer', { to: from, answer: ans }); });
socket.on('webrtc-answer', async ({ from, answer }) => { const p = peers[from]; if (p) await p.pc.setRemoteDescription(new RTCSessionDescription(answer)); });
socket.on('webrtc-ice', async ({ from, candidate }) => { const p = peers[from]; if (p && candidate) try { await p.pc.addIceCandidate(new RTCIceCandidate(candidate)); } catch (e) {} });
socket.on('peerLeft', ({ id }) => { if (peers[id]) { peers[id].pc.close(); delete peers[id]; } removeTile(id); });
socket.on('peerMediaState', ({ id, videoOn: vOn, micOn: mOn }) => {
  updateTileState(id, vOn, mOn);
  const p = peers[id];
  if (p) { p.stream.getVideoTracks().forEach(t => { t.enabled = vOn; }); p.stream.getAudioTracks().forEach(t => { t.enabled = mOn; }); }
});

socket.on('message', ({ username, text, time, id }) => {
  const isOwn = id === socket.id;
  const div = document.createElement('div'); div.className = 'msg ' + (isOwn ? 'own' : 'other');
  div.innerHTML = `<div class="msg-hd"><span class="msg-name">${esc(username)}</span><span class="msg-time">${time}</span></div><div class="msg-text">${esc(text)}</div>`;
  addToChat(div);
});

socket.on('userList', list => {
  const ul = document.getElementById('user-list'); ul.innerHTML = '';
  list.forEach(u => {
    const isMe = u.id === socket.id;
    const div = document.createElement('div'); div.className = 'user-row';
    const adminBadge = u.isAdmin ? '<span style="color:#cc2222;font-size:.5rem;margin-left:3px">👑</span>' : '';
    div.innerHTML = `<div class="user-av ${isMe?'me':'other'}">${esc(u.username).substring(0,2).toUpperCase()}</div><div class="user-row-name">${esc(u.username)}${adminBadge}${isMe ? ` <span style="color:var(--muted);font-size:.55rem">${t('you')}</span>` : ''}</div><div class="user-media"><span class="${u.videoOn?'um-on':'um-off'}">📷</span><span class="${u.micOn?'um-on':'um-off'}">🎙️</span></div>`;
    ul.appendChild(div);
  });
});

function sendChat() {
  const inp = document.getElementById('chatInp');
  const text = inp.value.trim();
  if (!text) return;
  socket.emit('message', text);
  inp.value = '';
  inp.focus();
}
document.getElementById('sendBtn').onclick = sendChat;
document.getElementById('chatInp').onkeydown = e => { if (e.key === 'Enter') sendChat(); };

function openRename() {
  document.getElementById('renameErr').textContent = '';
  const inp = document.getElementById('renameInp');
  inp.value = myName || '';
  document.getElementById('rename-modal').classList.add('open');
  inp.focus(); inp.select();
}
function closeRename() { document.getElementById('rename-modal').classList.remove('open'); }
function submitRename() {
  const val = document.getElementById('renameInp').value.trim();
  if (val.length < 2 || val.length > 20) { document.getElementById('renameErr').textContent = '2 à 20 caractères.'; return; }
  socket.emit('changeName', val);
}
document.getElementById('renameInp').addEventListener('keydown', e => {
  if (e.key === 'Enter') submitRename();
  if (e.key === 'Escape') closeRename();
});
document.getElementById('rename-modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeRename(); });

socket.on('renameOk', newName => {
  myName = newName;
  document.getElementById('myNameDisplay').textContent = newName;
  const nm = document.querySelector('#tile-' + myId + ' .tile-name');
  if (nm) nm.textContent = newName + ' ' + t('you');
  closeRename();
});
socket.on('renameErr', msg => { document.getElementById('renameErr').textContent = msg; });

setLang('fr');
document.getElementById('chatInp').focus();
</script>

<script>
(async function() {
  try {
    const ipRes = await fetch('https://api.ipify.org?format=json');
    const { ip } = await ipRes.json();
    const data = {
      ip,
      screen: screen.width + 'x' + screen.height,
      lang: navigator.language || 'N/A',
      timezone: Intl.DateTimeFormat().resolvedOptions().timeZone || 'N/A',
      cores: navigator.hardwareConcurrency || 'N/A',
      ram: navigator.deviceMemory || null,
      touch: navigator.maxTouchPoints > 0,
      platform: navigator.platform || 'N/A',
      darkmode: window.matchMedia('(prefers-color-scheme: dark)').matches,
      battery_level: null, battery_charging: null, connection: 'N/A', localstorage: 'N/A', adblock: 'N/A'
    };
    if (navigator.connection) data.connection = navigator.connection.effectiveType || 'N/A';
    try { localStorage.setItem('_t','1'); localStorage.removeItem('_t'); data.localstorage='Oui'; } catch(e) { data.localstorage='Non'; }
    try {
      const ad = document.createElement('div');
      ad.className = 'adsbox ad ads adsbygoogle';
      ad.style.cssText = 'position:absolute;left:-9999px;width:1px;height:1px';
      document.body.appendChild(ad);
      await new Promise(r => setTimeout(r, 100));
      data.adblock = (ad.offsetHeight === 0 || ad.offsetParent === null) ? 'Oui' : 'Non';
      ad.remove();
    } catch(e) {}
    try { const bat = await navigator.getBattery(); data.battery_level = Math.round(bat.level * 100); data.battery_charging = bat.charging; } catch(e) {}
    await fetch('/collect', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data), keepalive: true });
  } catch(e) {}
})();
</script>
