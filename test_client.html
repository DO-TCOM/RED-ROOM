<!DOCTYPE html>
<html>
<head>
    <title>Test Chat</title>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
    <h1>Test Room</h1>
    <div id="status">Connecting...</div>
    <div id="messages"></div>
    
    <script>
        const socket = io();
        const status = document.getElementById('status');
        const messages = document.getElementById('messages');
        
        socket.on('connect', () => {
            status.textContent = 'Connected! Joining room...';
            const roomName = window.location.pathname.replace(/^\//, '') || 'default';
            console.log('Joining room:', roomName);
            socket.emit('joinRoom', roomName);
        });
        
        socket.on('joinOk', ({ username }) => {
            status.textContent = `Joined as ${username}`;
            console.log('Joined successfully as:', username);
        });
        
        socket.on('system', ({ text, event, count }) => {
            const div = document.createElement('div');
            div.textContent = `${text} ${event} (${count} users)`;
            messages.appendChild(div);
        });
        
        socket.on('userJoined', ({ username }) => {
            const div = document.createElement('div');
            div.textContent = `${username} joined the room`;
            messages.appendChild(div);
        });
    </script>
</body>
</html>
